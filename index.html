<meta name="apple-mobile-web-app-title" content="Philly 2026">
<title>Philadelphia Marathon 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Saira+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0B;--card:#131316;--card2:#1C1C20;
  --text:#F4F1EA;--muted:#7E7E86;--faint:#33333A;
  --border:#1F1F23;--border2:#2C2C32;
  --accent:#FF3B24;--accent-soft:rgba(255,59,36,.14);
  --blue:#5B9BE0;--blue-bg:#0C1A2B;--blue-border:#1D3855;
  --green:#3FD08A;--green-bg:#062016;--green-border:#124031;
  --amber:#F5A623;--amber-bg:#221700;--amber-border:#40300A;
  --purple:#A78BFA;--purple-bg:#150E28;--purple-border:#2A1E4A;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Consolas,monospace;
  --sans:'Archivo',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --display:'Saira Condensed','Archivo Narrow',sans-serif;
  --radius:4px;
}
body.light{
  --bg:#EFECE4;--card:#FBF9F4;--card2:#F1EDE3;
  --text:#16151A;--muted:#79746D;--faint:#D8D2C6;
  --border:#E2DDD1;--border2:#CEC7B8;
  --accent:#E5361F;--accent-soft:rgba(229,54,31,.12);
  --blue:#25639F;--blue-bg:#E7F0FA;--blue-border:#BAD3EC;
  --green:#0E8A57;--green-bg:#E1F5EC;--green-border:#A9E3CB;
  --amber:#B4700A;--amber-bg:#FBF1DC;--amber-border:#EBCE93;
  --purple:#6B34D6;--purple-bg:#EEE8FC;--purple-border:#D3C5F5;
}
html{background:var(--bg);min-height:100%}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{margin:0}
a{color:var(--accent);text-decoration:none}
a:hover{color:var(--text)}

.app{max-width:440px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}

.hdr{padding:22px 20px 15px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg);position:relative}
.hdr::before{content:"";position:absolute;left:20px;top:0;width:36px;height:3px;background:var(--accent)}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.hdr-title{font-family:var(--display);font-size:30px;font-weight:800;line-height:.9;letter-spacing:.006em;text-transform:uppercase}
.hdr-countdown{font-family:var(--display);font-size:15px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--bg);background:var(--accent);padding:5px 9px 4px;border-radius:3px;white-space:nowrap}
.hdr-sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:10px;letter-spacing:.01em;text-transform:uppercase}
.hdr-sub #vdot-hdr{color:var(--text);font-weight:600}
.theme-toggle{background:transparent;border:1px solid var(--border2);color:var(--muted);font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.09em;cursor:pointer;padding:5px 8px;flex-shrink:0;border-radius:3px}
.theme-toggle:hover{color:var(--text);border-color:var(--accent)}

.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:var(--bg)}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;padding:12px 4px;font-family:var(--display);font-size:14px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;color:var(--muted);border:none;background:transparent;border-bottom:2.5px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap}
.tab.on{color:var(--text);border-bottom-color:var(--accent)}
.tab:hover:not(.on){color:var(--text)}

.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pane{display:none}.pane.on{display:block}

.today-hero{padding:24px 20px 18px;border-bottom:1px solid var(--border)}
.today-meta{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em}
.today-pill{display:inline-block;font-family:var(--display);font-size:11px;font-weight:700;padding:4px 11px 3px;margin-bottom:13px;border-radius:3px;letter-spacing:.09em;text-transform:uppercase}
.today-pill.e,.today-pill.x{background:var(--card2);color:var(--muted);border:1px solid var(--border2)}
.today-pill.q{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.today-pill.l{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.today-pill.r{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.today-pill.s{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border)}
.today-workout{font-family:var(--sans);font-size:22px;font-weight:600;line-height:1.32;color:var(--text);letter-spacing:-.01em;text-wrap:pretty}
.today-workout.q{color:var(--blue)}
.today-workout.l{color:var(--green)}
.today-workout.r{color:var(--amber);font-weight:700}
.today-workout.s{color:var(--purple)}
.today-workout.x{color:var(--muted)}
.today-shoe{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:9px;text-transform:uppercase;letter-spacing:.03em}
.today-gel{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:6px;line-height:1.45}

.wx-wrap{margin-top:18px;padding-top:15px;border-top:1px solid var(--border)}
.wx-strip{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center}
.wx-col{text-align:center}
.wx-time{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:600;letter-spacing:.05em}
.wx-icon{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.06em;color:var(--muted);margin-bottom:5px;min-height:15px}
.wx-temp{font-family:var(--display);font-size:26px;font-weight:800;color:var(--text);line-height:1}
.wx-feels{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px}
.wx-rain{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.wx-rec{text-align:center;padding:0 8px}
.wx-rec-lbl{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.wx-rec-time{font-family:var(--display);font-size:20px;font-weight:800;color:var(--accent);letter-spacing:.02em;text-transform:uppercase;line-height:1}
.wx-rec-why{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.35}
.wx-good{color:var(--green)}.wx-warm{color:var(--amber)}.wx-hot{color:var(--accent)}
.wx-loading{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;padding:12px 0;text-transform:uppercase;letter-spacing:.05em}

.week-strip{padding:18px 20px 15px;border-bottom:1px solid var(--border)}
.week-strip-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:13px;gap:10px}
.ws-label{font-family:var(--display);font-size:15px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.03em;line-height:1.1}
.ws-miles{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--muted);white-space:nowrap}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.dg-cell{padding:8px 2px;cursor:pointer;text-align:center;border:1px solid transparent;border-radius:3px;transition:background .1s,border-color .1s}
.dg-cell:hover{background:var(--card)}
.dg-cell.sel{border-color:var(--accent);background:var(--card)}
.dg-cell.today-cell{border-color:var(--border2);background:var(--card)}
.dg-cell.sel.today-cell{border-color:var(--accent)}
.dg-name{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.02em}
.dg-pip{width:7px;height:7px;margin:0 auto;border-radius:50%}
.pip-e{background:var(--faint)}
.pip-q{background:var(--blue)}
.pip-l{background:var(--green)}
.pip-r{background:var(--accent)}
.pip-s{background:var(--purple)}
.pip-x{background:var(--border2)}
.dg-done{font-size:0;line-height:0;margin-top:4px}
.dg-done::after{content:"";display:block;width:4px;height:4px;border-radius:50%;background:var(--accent);margin:0 auto}

.day-list{padding:6px 20px 16px}
.dl-item{align-items:flex-start;padding:10px 0 10px 14px;border-left:2px solid var(--border2);margin-bottom:3px;cursor:pointer;transition:border-color .12s,background .12s}
.dl-item:hover{border-left-color:var(--muted)}
.dl-item.sel{border-left-color:var(--accent);background:var(--card);padding:10px 12px 10px 12px;border-radius:0 3px 3px 0}
.dl-item.q{border-left-color:var(--blue)}
.dl-item.l{border-left-color:var(--green)}
.dl-item.r{border-left-color:var(--accent)}
.dl-item.s{border-left-color:var(--purple)}
.dl-day{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.dl-workout{font-family:var(--sans);font-size:14px;font-weight:500;color:var(--text);line-height:1.42}
.dl-workout.q{color:var(--blue)}
.dl-workout.l{color:var(--green)}
.dl-workout.r{color:var(--amber)}
.dl-workout.s{color:var(--purple)}
.dl-workout.x{color:var(--muted)}
.dl-meta{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:5px;line-height:1.4}
.dl-inner{flex:1;min-width:0}
.chk{width:24px;height:24px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:0;color:transparent;cursor:pointer;flex-shrink:0;margin-left:10px;border-radius:3px;transition:border-color .15s,background .15s}
.chk:hover{border-color:var(--accent)}
.chk.on{border-color:var(--accent);background:var(--accent)}
.chk.on::after{content:"";width:5px;height:9px;border:solid var(--bg);border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}
.dl-item.done-run .dl-workout{opacity:.36;text-decoration:line-through;text-decoration-color:var(--muted)}
.dl-item.done-run .dl-day{opacity:.5}

.week-nav{display:flex;justify-content:space-between;align-items:center;padding:13px 20px;border-top:1px solid var(--border)}
.wnav-btn{font-family:var(--display);font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;padding:8px 0}
.wnav-btn:hover{color:var(--accent)}
.wnav-btn:disabled{opacity:.3;cursor:default}
.wnav-cur{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--muted);text-align:center}

.notes-section{padding:18px 20px 22px;border-top:1px solid var(--border)}
.notes-hdr{font-family:var(--display);font-size:13px;font-weight:700;color:var(--text);letter-spacing:.06em;text-transform:uppercase;margin-bottom:11px;display:flex;align-items:center}
.notes-hdr::before{content:"";width:14px;height:2px;background:var(--accent);margin-right:8px}
.notes-input{width:100%;background:var(--card);border:1px solid var(--border2);color:var(--text);font-family:var(--sans);font-size:14px;padding:12px;resize:vertical;min-height:90px;line-height:1.55;display:block;border-radius:3px}
.notes-input:focus{outline:none;border-color:var(--accent);background:var(--card2)}
.notes-input::placeholder{color:var(--faint)}
.notes-actions{display:flex;gap:8px;margin-top:9px}
.nbtn{flex:1;padding:11px;font-family:var(--display);font-size:13px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;background:var(--card2);border:1px solid var(--border2);color:var(--muted);transition:all .1s;border-radius:3px}
.nbtn:hover:not(:disabled){color:var(--text);border-color:var(--muted)}
.nbtn.primary{color:var(--accent);border-color:var(--accent)}
.nbtn.primary:hover:not(:disabled){background:var(--accent-soft);color:var(--accent)}
.nbtn:disabled{opacity:.4;cursor:default}
.saved-tick{font-family:var(--mono);font-size:11px;color:var(--green);margin-left:8px;opacity:0;transition:opacity .3s;font-weight:600;letter-spacing:.04em;text-transform:none}

.plan-list{padding:0 20px}
.wk-row{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;gap:10px}
.wk-row:hover .wk-lbl{color:var(--text)}
.wk-row.cur .wk-lbl{color:var(--accent)}
.wk-row.cur .wk-num-col{border-left:2px solid var(--accent);padding-left:10px;margin-left:-12px}
.wk-num-col{transition:border-color .1s}
.wk-lbl{font-family:var(--display);font-size:17px;font-weight:700;color:var(--muted);transition:color .1s;text-transform:uppercase;letter-spacing:.02em;line-height:1}
.wk-phase{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.01em}
.wk-right{margin-left:auto;text-align:right;flex-shrink:0}
.wk-mi{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--text)}
.wk-cut{font-family:var(--mono);font-size:10px;color:var(--amber);display:block;text-transform:uppercase;letter-spacing:.03em;margin-top:2px}
.wk-pips{display:flex;gap:3px;margin-top:5px;justify-content:flex-end}
.wk-pip{width:5px;height:5px;border-radius:50%}
.wk-expand{padding:6px 0 12px 4px;display:none;border-bottom:1px solid var(--border)}
.wk-exp-day{font-family:var(--sans);font-size:13px;padding:4px 0;color:var(--muted);line-height:1.4}
.wk-exp-day .dn{display:inline-block;width:34px;font-family:var(--mono);font-size:10px;text-transform:uppercase;color:var(--faint);letter-spacing:.03em}
.wk-exp-day.q .dt{color:var(--blue)}
.wk-exp-day.l .dt{color:var(--green)}
.wk-exp-day.r .dt{color:var(--amber)}
.wk-note-indicator{font-family:var(--mono);font-size:10px;color:var(--green);margin-top:4px;text-transform:uppercase;letter-spacing:.03em}

.ref{padding:20px}
.ref-sec{margin-bottom:26px}
.ref-title{font-family:var(--display);font-size:14px;font-weight:700;color:var(--text);padding-bottom:9px;border-bottom:1px solid var(--border);margin-bottom:11px;text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center}
.ref-title::before{content:"";width:14px;height:2px;background:var(--accent);margin-right:8px;flex-shrink:0}
.ref-title.toggle{cursor:pointer;justify-content:space-between;user-select:none}
.ref-title.toggle:hover{color:var(--accent)}
.ref-row{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px;font-weight:500;gap:12px}
.ref-row:last-child{border-bottom:none}
.ref-key{color:var(--muted);flex-shrink:0}
.ref-val{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text);text-align:right}
.race-row{padding:11px 0;border-bottom:1px solid var(--border)}
.race-row:last-child{border-bottom:none}
.race-date{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.race-name{font-family:var(--display);font-size:16px;color:var(--text);font-weight:700;margin:3px 0;text-transform:uppercase;letter-spacing:.02em}
.race-pace{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent)}
.shoe-row{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);align-items:baseline}
.shoe-row:last-child{border-bottom:none}
.shoe-name{font-family:var(--display);font-size:14px;font-weight:700;color:var(--text);width:96px;flex-shrink:0;text-transform:uppercase;letter-spacing:.02em}
.shoe-use{font-size:13px;color:var(--muted)}
.ex-item{padding:10px 0;border-bottom:1px solid var(--border)}
.ex-item:last-child{border-bottom:none}
.ex-name{font-family:var(--sans);font-size:14px;color:var(--text);font-weight:700;margin-bottom:3px}
.ex-sets{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent)}
.ex-note{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.45}
.lift-body{display:none}
.circuit-item{font-size:14px;font-weight:500;color:var(--muted);padding:6px 0;border-bottom:1px solid var(--border)}
.circuit-item:last-child{border-bottom:none}
.swim-block{padding:9px 0;border-bottom:1px solid var(--border)}
.swim-block:last-child{border-bottom:none}
.swim-name{font-family:var(--display);font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;text-transform:uppercase;letter-spacing:.02em}
.swim-desc{font-size:13px;color:var(--muted);line-height:1.55}

.vdot-card{background:var(--card);padding:18px 20px;margin-bottom:1px}
.vdot-big{font-family:var(--display);font-size:48px;font-weight:800;color:var(--accent);letter-spacing:.01em;line-height:.9}
.vdot-lbl{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.05em}
.vdot-sub{font-size:13px;color:var(--muted);margin-top:6px}
.vf-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.vf-label{font-size:13px;color:var(--muted);width:70px;flex-shrink:0}
.vf-select{flex:1;background:var(--card);border:1px solid var(--border2);color:var(--text);font-family:var(--sans);font-size:14px;padding:9px;border-radius:3px}
.vf-select:focus{outline:none;border-color:var(--accent)}
.vf-input{flex:1;background:var(--card);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:15px;padding:9px;border-radius:3px}
.vf-input:focus{outline:none;border-color:var(--accent)}
.vf-btn{width:100%;padding:11px;font-family:var(--display);font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;background:var(--card2);border:1px solid var(--border2);color:var(--text);margin-top:4px;border-radius:3px}
.vf-btn.primary{border-color:var(--accent);color:var(--accent)}
.vf-btn:hover{border-color:var(--text);color:var(--text)}
.vf-result{padding:13px 15px;background:var(--card);border-left:2px solid var(--accent);margin:10px 0;display:none;border-radius:0 3px 3px 0}
.vf-result-vdot{font-family:var(--display);font-size:26px;font-weight:800;color:var(--accent)}
.vf-result-paces{font-family:var(--mono);font-size:13px;color:var(--muted);margin-top:5px;line-height:1.7}
.effort-item{padding:11px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:baseline}
.effort-item:last-child{border-bottom:none}
.effort-left{flex:1}
.effort-name{font-size:14px;font-weight:500;color:var(--text)}
.effort-detail{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:3px}
.effort-vdot{font-family:var(--display);font-size:18px;font-weight:800;color:var(--accent)}
.effort-use{font-size:12px;color:var(--muted);cursor:pointer;margin-top:2px;text-align:right}
.effort-use:hover{color:var(--accent)}
.del-btn{font-size:11px;color:var(--faint);cursor:pointer;margin-left:10px;padding:2px 4px;border:none;background:none;font-family:var(--sans)}
.del-btn:hover{color:var(--accent)}
.pc-input:focus{outline:none;border-color:var(--accent)}

.notes-display-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.notes-display-label{font-family:var(--display);font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.edit-link{font-family:var(--mono);font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.edit-link:hover{text-decoration:underline}
.notes-display-text{font-size:14px;color:var(--text);line-height:1.6;background:var(--card);padding:12px 14px;border-left:2px solid var(--border2);border-radius:0 3px 3px 0}
.regen-btn:hover{color:var(--accent)}

#pane-today.on{display:flex;flex-direction:column}
.today-col-left{order:2}
.today-hero{order:1}
.notes-section{order:3}

.itb-flag{display:inline-flex;align-items:center;gap:6px;font-family:var(--display);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 11px 3px;border-radius:3px;margin-bottom:13px}

.day-edit-btn{font-family:var(--sans);font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 6px;line-height:1;flex-shrink:0;margin-top:1px;opacity:.45}
.day-edit-btn:hover{color:var(--accent);opacity:1}
.day-edit-wrap{padding:10px 14px 12px;background:var(--card);border-left:2px solid var(--accent);margin:2px 0 6px;border-radius:0 3px 3px 0}
.day-edit-ta{width:100%;box-sizing:border-box;background:var(--bg);border:1.5px solid var(--border2);border-radius:3px;color:var(--text);font-family:var(--sans);font-size:13px;padding:10px 12px;resize:vertical;min-height:64px;line-height:1.5}
.day-edit-ta:focus{outline:none;border-color:var(--accent)}
.day-edit-btns{display:flex;gap:6px;margin-top:8px;align-items:center}
.day-save-btn{padding:8px 20px;font-family:var(--display);font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;background:var(--accent);border:none;color:var(--bg);border-radius:3px}
.day-cancel-btn{padding:8px 16px;font-family:var(--display);font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;background:none;border:1.5px solid var(--border2);color:var(--muted);border-radius:3px}
.day-reset-btn{font-family:var(--mono);font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;margin-left:auto;text-decoration:underline;padding:0}
.day-edited-mark{font-size:10px;color:var(--amber);margin-left:4px;font-style:normal}
.day-swap-btn{font-family:var(--sans);font-size:14px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 6px;line-height:1;flex-shrink:0;margin-top:1px;opacity:.45}
.day-swap-btn:hover{color:var(--accent);opacity:1}
.day-swap-btn.swap-pick{color:var(--accent);opacity:1;font-weight:700}
.dl-item.swap-target{border:1px dashed var(--accent);background:var(--card2);cursor:pointer}
.dl-item.swap-source{border:1px solid var(--accent);opacity:.7}
.swap-hint{font-family:var(--mono);font-size:11px;color:var(--accent);padding:6px 14px;font-style:italic}

.dash{padding:0 0 40px}
.dash-hdr{display:flex;justify-content:space-between;align-items:center;padding:20px 20px 15px;border-bottom:1px solid var(--border);gap:12px}
.dash-hdr-title{font-family:var(--display);font-size:16px;font-weight:800;color:var(--text);text-transform:uppercase;letter-spacing:.04em}
.dash-sync-row{display:flex;align-items:center;gap:10px}
.dash-sync-lbl{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.dash-sync-btn{padding:7px 14px;font-family:var(--display);font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;background:none;border:1px solid #fc4c02;color:#fc4c02;border-radius:3px}
.dash-sync-btn:hover{background:#fc4c0218}
.stat-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--border);margin-bottom:1px}
.stat-card{background:var(--bg);padding:17px 20px}
.stat-card-val{font-family:var(--display);font-size:32px;font-weight:800;color:var(--text);line-height:.92;margin-bottom:6px;letter-spacing:.01em}
.stat-card-lbl{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.stat-card-sub{font-size:11px;color:var(--muted);margin-top:3px}
.dash-sec{padding:22px 20px 0}
.dash-sec-title{font-family:var(--display);font-size:14px;font-weight:700;color:var(--text);margin-bottom:15px;text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center}
.dash-sec-title::before{content:"";width:14px;height:2px;background:var(--accent);margin-right:8px;flex-shrink:0}
.vol-canvas-wrap{width:100%;height:140px}
.run-cards{display:flex;flex-direction:column;gap:1px;background:var(--border)}
.run-card{display:flex;align-items:center;gap:12px;padding:13px 20px;background:var(--bg);cursor:default}
.run-card-bar{width:3px;height:38px;border-radius:2px;flex-shrink:0}
.run-card-bar.easy{background:var(--muted);opacity:.4}
.run-card-bar.mod{background:var(--accent)}
.run-card-bar.hard{background:var(--green)}
.run-card-body{flex:1;min-width:0}
.run-card-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:3px}
.run-card-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.run-card-dist{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text);flex-shrink:0}
.run-card-meta{font-family:var(--mono);font-size:11px;color:var(--muted)}
.run-card-date{font-family:var(--mono);font-size:11px;color:var(--muted);flex-shrink:0;text-align:right;min-width:56px}
.trend-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;background:var(--border)}
.trend-cell{background:var(--bg);padding:16px 20px 14px}
.trend-canvas-wrap{width:100%;height:90px;margin-top:8px}
.dash-no-data{padding:56px 20px;text-align:center}
.dash-no-data-title{font-family:var(--display);font-size:16px;font-weight:700;color:var(--text);margin-bottom:8px;text-transform:uppercase;letter-spacing:.03em}
.dash-no-data-sub{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:20px}
.dash-connect-btn{padding:11px 26px;font-family:var(--display);font-size:13px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;background:none;border:1px solid #fc4c02;color:#fc4c02;border-radius:3px}

.rr-list{display:flex;flex-direction:column;gap:1px;background:var(--border)}
.rr-card{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;background:var(--bg);gap:12px}
.rr-card.rr-done{background:var(--card)}
.rr-name{font-family:var(--display);font-size:15px;font-weight:700;color:var(--text);margin-bottom:3px;text-transform:uppercase;letter-spacing:.02em}
.rr-date{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
.rr-vdot{font-family:var(--mono);font-size:12px;color:var(--accent);margin-top:4px;font-weight:600}
.rr-time{font-family:var(--mono);font-size:19px;font-weight:700;color:var(--text);text-align:right}
.rr-clear{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:4px;margin-left:4px}
.rr-clear:hover{color:var(--accent)}
.rr-input{background:var(--card);border:1.5px solid var(--border2);border-radius:3px;color:var(--text);font-family:var(--mono);font-size:14px;padding:8px 10px;width:100px;text-align:center}
.rr-input:focus{outline:none;border-color:var(--accent)}
.rr-save{padding:8px 15px;font-family:var(--display);font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;background:var(--accent);border:none;color:var(--bg);border-radius:3px;white-space:nowrap}

@media(min-width:768px){
  .app{max-width:100%}
  .hdr{padding:24px 40px 18px}
  .hdr::before{left:40px}
  .hdr-title{font-size:38px}
  .hdr-sub{font-size:12px}
  .hdr-countdown{font-size:17px}
  .tabs{padding:0 28px}
  .tab{flex:none;padding:14px 34px;font-size:15px}
  .content{height:calc(100vh - 132px);overflow:hidden}
  .pane.on:not(#pane-today){overflow-y:auto;height:100%}
  #pane-today.on{display:grid;grid-template-columns:420px 1fr;grid-template-rows:auto 1fr;grid-template-areas:"left hero" "left notes";height:100%;overflow:hidden}
  .today-col-left{grid-area:left;overflow-y:auto;border-right:1px solid var(--border);order:unset}
  .today-hero{grid-area:hero;order:unset;padding:36px 48px 26px;border-bottom:1px solid var(--border)}
  .today-workout{font-size:27px}
  .notes-section{grid-area:notes;overflow-y:auto;order:unset;padding:28px 48px 36px}
  .week-strip{padding:24px 24px 18px}

  .week-nav{padding:15px 24px}
  .ws-label{font-size:16px}
  .dl-workout{font-size:15px}
  .plan-list{padding:0 40px;max-width:980px}
  .wk-lbl{font-size:20px}
  .wk-expand{padding:8px 0 16px 6px}
  .wk-exp-day{font-size:14px}
  .ref{padding:32px 40px;max-width:860px;margin:0 auto;width:100%}
  .vdot-card{padding:24px 40px}
  .stat-cards{grid-template-columns:repeat(4,1fr)}
  .dash-hdr{padding:24px 40px 20px}
  .dash-sec{padding:26px 40px 0}
  .run-card{padding:13px 40px}
  .trend-cell{padding:16px 40px 14px}
  .vol-canvas-wrap{height:160px}
  .trend-canvas-wrap{height:110px}
  .dash-no-data{padding:80px 40px}
}


.crew-header{padding:22px 18px 14px;border-bottom:1px solid var(--border)}

.crew-sub{font-size:13px;color:var(--muted)}
.crew-form{padding:16px 18px;border-bottom:1px solid var(--border)}

.crew-btn:disabled{opacity:.4;cursor:default}
.crew-status{font-size:12px;color:var(--muted);margin-top:6px;min-height:16px}
.crew-list{padding:0 18px}
.crew-empty{font-size:14px;color:var(--muted);padding:32px 0;text-align:center}
.crew-comment{padding:16px 0;border-bottom:1px solid var(--border)}

.crew-name{font-size:14px;font-weight:700;color:var(--accent)}

function timeAgo(ts){
  const d=Date.now()-ts,m=Math.floor(d/60000),h=Math.floor(d/3600000),days=Math.floor(d/86400000);
  if(m<2)return'just now';if(m<60)return m+'m ago';if(h<24)return h+'h ago';return days+'d ago';
}

function deleteComment(idx){
  if(!canWrite())return;
  const pw=prompt('Enter password to delete:');
  if(pw!=='done')return;
  if(!Array.isArray(appData.comments))return;
  appData.comments.splice(idx,1);

}

async function postComment(){
  const nameEl=document.getElementById('crew-name');
  const msgEl=document.getElementById('crew-msg');
  const status=document.getElementById('crew-status');
  const btn=document.querySelector('.crew-btn');
  const name=(nameEl?.value||'').trim();
  const message=(msgEl?.value||'').trim();
  if(!name){document.getElementById('crew-name')?.focus();status.textContent='Name is required ↑';return;}
  if(!message){status.textContent='Write something first';return;}
  status.textContent='Posting…';
  if(btn)btn.disabled=true;
  try{
    if(canWrite()){
      // Token holder: write directly to GitHub
      await _postCommentDirect(name,message);
    } else {
      // Friends: use Cloudflare function
      await _postCommentViaFunction(name,message);
    }
    if(msgEl)msgEl.value='';
    localStorage.setItem('philly_crew_name',name);
    status.textContent='✓ Posted!';
    setTimeout(()=>{status.textContent='';renderCrew();},800);
  }catch(e){
    status.textContent='⚠ '+e.message;
    if(btn)btn.disabled=false;
  }
}

async function _postCommentDirect(name,message){
  const token=ghToken();
  const headers={'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json','User-Agent':'hoguemarathon'};
  const r=await fetch(GH_API,{headers});
  if(!r.ok)throw new Error('Could not load data.json');
  const file=await r.json();
  const sha=file.sha;
  const bytes=Uint8Array.from(atob(file.content.replace(/\n/g,'')),c=>c.charCodeAt(0));
  const data=JSON.parse(new TextDecoder().decode(bytes));
  if(!Array.isArray(data.comments))data.comments=[];
  data.comments.unshift({name,message,ts:Date.now()});
  if(data.comments.length>200)data.comments.length=200;
  data.updatedAt=Date.now();
  const json=JSON.stringify(data,null,2);
  const content=btoa(String.fromCharCode(...new TextEncoder().encode(json)));
  const put=await fetch(GH_API,{method:'PUT',headers,body:JSON.stringify({message:'Comment from '+name,content,sha})});
  if(!put.ok){const e=await put.json();throw new Error(e.message||'Write failed');}
  Object.assign(appData,data);
  localStorage.setItem('philly_app_cache',JSON.stringify(appData));
}

async function _postCommentViaFunction(name,message){
  let res;
  try{res=await fetch('/comment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,message})});}
  catch(e){throw new Error('Could not reach server — check your connection.');}
  const text=await res.text();
  let data;
  try{data=JSON.parse(text);}catch(e){
    if(res.status===404)throw new Error('Comments service not set up yet.');
    throw new Error('Server error ('+res.status+')');
  }
  if(!data.ok)throw new Error(data.error||'Failed to post');
  // Refetch to sync
  try{const r=await fetch(GH_RAW+'?t='+Date.now());if(r.ok){const d=await r.json();Object.assign(appData,d);localStorage.setItem('philly_app_cache',JSON.stringify(appData));}}catch(e){}
}

const GH_REPO = 'hoguewd/hoguemarathon';
const GH_DATA  = 'data.json';
const GH_RAW   = `https://raw.githubusercontent.com/${GH_REPO}/main/${GH_DATA}`;
const GH_API   = `https://api.github.com/repos/${GH_REPO}/contents/${GH_DATA}`;

let appData = {

  vdot:55, stravaActuals:{}, stravaActivities:[], stravaLastSync:0, updatedAt:0

function ghToken(){ return localStorage.getItem('philly_gh_token')||''; }
function canWrite(){ return !!ghToken(); }

// Debounced GitHub write
let _ghTimer=null;
function writeAppData(){
  // Instant local cache
  localStorage.setItem('philly_app_cache', JSON.stringify(appData));
  if(!canWrite()) return;
  clearTimeout(_ghTimer);
  _ghTimer=setTimeout(_doGhWrite, 1500);
}

async function _doGhWrite(){
  const token=ghToken(); if(!token)return;
  const body=JSON.stringify({...appData, updatedAt:Date.now()}, null, 2);
  const headers={'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'};
  try{
    let sha=null;
    const r=await fetch(GH_API,{headers});
    if(r.ok){ const d=await r.json(); sha=d.sha; }
    const payload={message:'Sync app data',content:btoa(unescape(encodeURIComponent(body)))};
    if(sha)payload.sha=sha;
    await fetch(GH_API,{method:'PUT',headers,body:JSON.stringify(payload)});
  }catch(e){ /* silent fail — data stays in cache */ }
}

async function loadAppData(){
  // 1. Load from localStorage cache immediately (fast, enables offline)
  try{
    const cached=localStorage.getItem('philly_app_cache');
    if(cached){ const c=JSON.parse(cached); Object.assign(appData,c); applyAppData(); }
  }catch(e){}

  // 2. Fetch fresh via GitHub API (no CDN cache — always current)
  try{
    const headers={'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28','User-Agent':'hoguemarathon'};
    if(ghToken())headers['Authorization']='Bearer '+ghToken();
    const r=await fetch(GH_API,{headers});
    if(r.ok){
      const file=await r.json();
      const bytes=Uint8Array.from(atob(file.content.replace(/\n/g,'')),c=>c.charCodeAt(0));
      const d=JSON.parse(new TextDecoder().decode(bytes));
      if(d.updatedAt>=(appData.updatedAt||0)){
        Object.assign(appData,d);
        applyAppData();
        localStorage.setItem('philly_app_cache',JSON.stringify(appData));
        renderToday();renderPlan();renderStats();
      }
    }
  }catch(e){
    // Fallback to raw URL if API fails
    try{
      const r=await fetch(GH_RAW+'?t='+Date.now());
      if(r.ok){const d=await r.json();if(d.updatedAt>=(appData.updatedAt||0)){Object.assign(appData,d);applyAppData();localStorage.setItem('philly_app_cache',JSON.stringify(appData));renderToday();renderPlan();renderStats();}}
    }catch(e2){}
  }
}

function applyAppData(){
  stravaActuals = appData.stravaActuals||{};
  // Write to localStorage so stats tab and other consumers can read
  if(appData.stravaActuals && Object.keys(appData.stravaActuals).length>0)
    localStorage.setItem('philly_strava_actuals', JSON.stringify(appData.stravaActuals));
  if(appData.stravaActivities && appData.stravaActivities.length>0)
    localStorage.setItem('philly_strava_activities', JSON.stringify(appData.stravaActivities));
  if(appData.vdot&&appData.vdot!==workingVDOT){
    workingVDOT=appData.vdot;
    const el=document.getElementById('vdot-hdr');
    if(el)el.textContent=workingVDOT.toFixed(1);
  }
}

let workingVDOT = parseFloat(localStorage.getItem('philly_2026_vdot') || '55');

function calcVDOT(distM, timeMins) {
  const v = distM / timeMins;
  const vo2 = -4.60 + 0.182258*v + 0.000104*v*v;
  const pct = 0.8 + 0.1894393*Math.exp(-0.012778*timeMins) + 0.2989558*Math.exp(-0.1932605*timeMins);
  return Math.round((vo2/pct)*10)/10;
}

function vdotPace(vdot, pct) {
  // Find speed (m/min) that requires pct% of vdot VO2
  const target = vdot * pct / 100;
  const a=0.000104, b=0.182258, c=-(target+4.60);
  const v = (-b + Math.sqrt(b*b - 4*a*c)) / (2*a);
  const mpm = 1609.34 / v;
  const mins = Math.floor(mpm);
  const secs = Math.round((mpm-mins)*60);
  return secs===60 ? `${mins+1}:00` : `${mins}:${String(secs).padStart(2,'0')}`;
}

function getDynPaces(vdot) {
  return [
    ["Easy (E)",       `${vdotPace(vdot,59)}–${vdotPace(vdot,74)} /mi`],
    ["Marathon (M)",   `${vdotPace(vdot,82)} /mi`],
    ["Threshold (T)",  `${vdotPace(vdot,88)} /mi`],
    ["Interval (I)",   `${vdotPace(vdot,95)}–${vdotPace(vdot,100)} /mi`],
    ["Repetition (R)", `${vdotPace(vdot,105)}–${vdotPace(vdot,110)} /mi`],
  ];
}

function setWorkingVDOT(v) {
  workingVDOT = v;
  localStorage.setItem('philly_2026_vdot', v);
  appData.vdot = v; writeAppData();
  const el = document.getElementById('vdot-hdr');
  if (el) el.textContent = v.toFixed(1);

  if (document.getElementById('pane-ref').classList.contains('on')) renderRef();
}

function parseTime(str) {
  // Accepts MM:SS or H:MM:SS
  const parts = str.trim().split(':').map(Number);
  if (parts.some(isNaN)) return null;
  if (parts.length === 2) return parts[0] + parts[1]/60;
  if (parts.length === 3) return parts[0]*60 + parts[1] + parts[2]/60;
  return null;
}

function parseRaceTime(s){
  const p=s.trim().split(':').map(Number);
  if(p.some(isNaN)||p.length<2||p.length>3)return null;
  return p.length===3?p[0]*3600+p[1]*60+p[2]:p[0]*60+p[1];
}
function loadRaceResult(i){

function planStarted(){ return new Date() >= PLAN_START; }

function getWeekIdx(){

function fmtDate(d){return d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});}

function wxCls(f){return f<=65?'wx-good':f<=76?'wx-warm':'wx-hot';}

function wxScore(feels,rain){
  let s;
  if(feels<25)s=20; else if(feels<35)s=45; else if(feels<45)s=72;
  else if(feels<=62)s=100; else if(feels<=68)s=85; else if(feels<=74)s=65;
  else if(feels<=80)s=40; else if(feels<=86)s=20; else s=8;
  return Math.max(0, s - (rain||0)*0.3);
}

function wxRec(am,pm){
  if(am.feels>82&&pm.feels>82)
    return{time:'Early AM',why:'Both windows very hot — aim for 5–6am or adjust effort'};
  const d=wxScore(am.feels,am.rain)-wxScore(pm.feels,pm.rain);
  if(d>18)return{time:'AM',why:`Feels ${am.feels}° at 7am vs ${pm.feels}° at 5pm`};
  if(d>7) return{time:'AM',why:`Slightly cooler at 7am`};
  if(d<-18)return{time:'PM',why:`Feels ${pm.feels}° at 5pm vs ${am.feels}° at 7am`};
  if(d<-7) return{time:'PM',why:`Slightly better at 5pm`};
  if(am.feels<=62&&pm.feels<=62)return{time:'Either',why:'Great running weather both windows'};
  return{time:'Either',why:'Similar conditions — pick what fits your schedule'};
}

function wxHtml(wx){
  const rec=wxRec(wx.am,wx.pm);
  const col=(d)=>`
    <div class="wx-col">
      <div class="wx-time">${d.label}</div>
      <div class="wx-icon">${wmoIcon(d.code)}</div>
      <div class="wx-temp ${wxCls(d.feels)}">${d.temp}°</div>
      <div class="wx-feels">Feels ${d.feels}°</div>
      ${d.rain>10?`<div class="wx-rain">${d.rain}% rain</div>`:''}
    </div>`;
  wx.am.label='7 AM'; wx.pm.label='5 PM';
  return`<div class="wx-wrap"><div class="wx-strip">
    ${col(wx.am)}
    <div class="wx-rec">
      <div class="wx-rec-lbl">Best window</div>
      <div class="wx-rec-time">${rec.time}</div>
      <div class="wx-rec-why">${rec.why}</div>
    </div>
    ${col(wx.pm)}
  </div></div>`;
}

const wxCache={};
function wmoIcon(code){
  if(code===0)return'CLR';
  if(code<=2)return'PC';
  if(code===3)return'OVC';
  if(code<=48)return'FOG';
  if(code<=57)return'DRZ';
  if(code<=67)return'RN';
  if(code<=77)return'SN';
  if(code<=82)return'SHWR';
  if(code<=86)return'SN';
  return'STM';
}
async function loadWx(dateStr){
  const el=document.getElementById('wx-panel');
  if(!el)return;
  const today=new Date();today.setHours(0,0,0,0);
  const target=new Date(dateStr+'T00:00:00');
  const diff=Math.round((target-today)/864e5);
  if(diff<0||diff>14){el.innerHTML='';return;}
  if(wxCache[dateStr]){el.innerHTML=wxHtml(wxCache[dateStr]);return;}
  el.innerHTML='<div class="wx-loading">Loading weather…</div>';
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=40.7128&longitude=-74.006&hourly=temperature_2m,apparent_temperature,precipitation_probability,weathercode&temperature_unit=fahrenheit&timezone=America%2FNew_York&start_date=${dateStr}&end_date=${dateStr}`;
    const d=(await (await fetch(url)).json()).hourly;
    const fi=(hr)=>d.time.findIndex(t=>t.endsWith('T'+hr+':00'));
    const ai=fi('07'),pi=fi('17');
    const wx={
      am:{temp:Math.round(d.temperature_2m[ai]),feels:Math.round(d.apparent_temperature[ai]),rain:d.precipitation_probability[ai],code:d.weathercode[ai]},
      pm:{temp:Math.round(d.temperature_2m[pi]),feels:Math.round(d.apparent_temperature[pi]),rain:d.precipitation_probability[pi],code:d.weathercode[pi]}
    };
    wxCache[dateStr]=wx;
    el.innerHTML=wxHtml(wx);
  }catch(e){el.innerHTML='';}
}

// ── IT Band Risk ─────────────────────────────────────────────────────────────
function itbRisk(wkIdx) {
  // Use actual miles from Strava where available, fall back to plan
  const actualCur  = stravaActuals[wkIdx]   != null ? stravaActuals[wkIdx]   : null;
  const actualPrev = stravaActuals[wkIdx-1] != null ? stravaActuals[wkIdx-1] : null;
  const cur  = actualCur  != null ? actualCur  : W[wkIdx].mi;
  const prev = actualPrev != null ? actualPrev : (wkIdx > 0 ? W[wkIdx-1].mi : 28);
  const jump = prev > 0 ? (cur - prev) / prev : 0;

  // Quality sessions and long run from plan (structure risk)
  const quals = W[wkIdx].days.filter(d => d[1]==='q').length;
  const lr = W[wkIdx].days.reduce((mx,d) => {
    if (d[1]!=='l') return mx;
    const m = d[0].match(/(\d+)mi/); return m ? Math.max(mx,+m[1]) : mx;
  }, 0);

  // Flag if actual miles are tracking significantly over plan
  const overPlan = actualCur != null ? actualCur - W[wkIdx].mi : 0;

  if (jump>0.45||(quals>=2&&jump>0.3)||(lr>=20&&jump>0.35)||overPlan>8) return 'red';
  if (jump>0.28||(quals>=2&&jump>0.1)||lr>=20||overPlan>4) return 'amber';
  return 'green';
}
function itbLabel(r) {
  const src = (stravaActuals[selWeek]!=null||stravaActuals[selWeek-1]!=null) ? '' : ' (plan)';
  return r==='green'?`Load: manageable${src}`:r==='amber'?`Load: watch knee${src}`:`Load: high — protect knee${src}`;
}

function stravaOpenAuth() {

    +'&response_type=code&redirect_uri=http://localhost&approval_prompt=force&scope=activity:read';

function extractStravaCode(raw) {
  // Accept full URL or bare code
  if (raw.includes('code=')) {
    const m = raw.match(/[?&]code=([^&]+)/);
    return m ? m[1] : raw.trim();
  }
  return raw.trim();
}

async function stravaConnect() {
  const clientId = localStorage.getItem('philly_strava_client_id');
  const secret   = localStorage.getItem('philly_strava_client_secret');
  const raw      = document.getElementById('strava-auth-code').value;
  const code     = extractStravaCode(raw);
  if (!clientId || !secret || !code) { alert('Complete all three steps first.'); return; }
  const statusEl = document.getElementById('strava-status');
  statusEl.textContent = 'Connecting…';
  try {
    const res = await fetch('https://www.strava.com/oauth/token', {
      method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: new URLSearchParams({client_id:clientId, client_secret:secret, code:code, grant_type:'authorization_code'})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message||'Authorization failed ('+res.status+')');
    localStorage.setItem('philly_strava_access_token', data.access_token);
    localStorage.setItem('philly_strava_refresh_token', data.refresh_token);
    localStorage.setItem('philly_strava_expires_at', data.expires_at);
    statusEl.textContent = 'Connected! Syncing…';
    await _stravaFetchAndStore(data.access_token, statusEl);
    renderRef();
  } catch(e) {
    statusEl.textContent = 'Error: '+e.message;
  }
}

async function stravaRefreshAndSync() {
  const clientId = localStorage.getItem('philly_strava_client_id');
  const secret   = localStorage.getItem('philly_strava_client_secret');
  const refresh  = localStorage.getItem('philly_strava_refresh_token');
  const statusEl = document.getElementById('strava-status');
  if (!clientId||!secret||!refresh) { if(statusEl) statusEl.textContent='Not connected — complete setup below'; renderRef(); return; }
  if (statusEl) statusEl.textContent = 'Refreshing token…';
  try {
    const res = await fetch('https://www.strava.com/oauth/token', {
      method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: new URLSearchParams({client_id:clientId, client_secret:secret, refresh_token:refresh, grant_type:'refresh_token'})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message||'Refresh failed');
    localStorage.setItem('philly_strava_access_token', data.access_token);
    localStorage.setItem('philly_strava_refresh_token', data.refresh_token);
    localStorage.setItem('philly_strava_expires_at', data.expires_at);
    await _stravaFetchAndStore(data.access_token, statusEl);
    renderRef();
  } catch(e) {
    if (statusEl) statusEl.textContent = 'Error: '+e.message;
  }
}

async function stravaSync() {
  const statusEl = document.getElementById('strava-status');
  const expiresAt = parseInt(localStorage.getItem('philly_strava_expires_at')||'0');
  const token = localStorage.getItem('philly_strava_access_token');
  // Auto-refresh if expired or expiring within 5 min
  if (!token || Math.floor(Date.now()/1000) > expiresAt - 300) {
    return stravaRefreshAndSync();
  }
  if (statusEl) statusEl.textContent = 'Syncing…';
  await _stravaFetchAndStore(token, statusEl);
  renderRef();
}

async function _stravaFetchAndStore(token, statusEl) {
  const planStart = Math.floor(PLAN_START.getTime()/1000);
  const res = await fetch(
    'https://www.strava.com/api/v3/athlete/activities?after='+planStart+'&per_page=200',
    {headers:{Authorization:'Bearer '+token}}
  );
  if (!res.ok) throw new Error('Strava API error '+res.status);
  const acts = await res.json();
  const runs = acts.filter(a=>a.sport_type==='Run'||a.type==='Run');

  const newActuals = {};
  const activities = [];

  runs.forEach(run=>{
    const d=new Date(run.start_date_local); d.setHours(0,0,0,0);
    const dateStr=d.toISOString().split('T')[0];
    let wkIdx=-1;
    for(let i=0;i<W.length;i++){
      const wkStart=parseLocal(W[i].start);
      const wkEnd=new Date(wkStart); wkEnd.setDate(wkEnd.getDate()+7);
      if(d>=wkStart&&d<wkEnd){ wkIdx=i; break; }
    }
    if(wkIdx>=0){
      if(!newActuals[wkIdx])newActuals[wkIdx]=0;
      newActuals[wkIdx]+=run.distance/1609.34;
    }
    const mi=run.distance/1609.34;
    const pace=run.moving_time>0&&mi>0?(run.moving_time/60)/mi:0;
    activities.push({
      id:run.id,date:dateStr,name:run.name,
      mi:Math.round(mi*100)/100,
      pace:Math.round(pace*100)/100,
      duration:run.moving_time,
      cadence:run.average_cadence||0,
      effort:run.relative_effort||0,
      elevation:Math.round((run.total_elevation_gain||0)*3.28084),
      wkIdx:wkIdx
    });
  });

  activities.sort((a,b)=>b.date.localeCompare(a.date));
  stravaActuals=newActuals;
  localStorage.setItem('philly_strava_actuals',JSON.stringify(stravaActuals));
  appData.stravaActuals=stravaActuals;
  appData.stravaActivities=activities;
  appData.stravaLastSync=Date.now();
  writeAppData();
  localStorage.setItem('philly_strava_activities',JSON.stringify(activities));
  localStorage.setItem('philly_strava_synced',Date.now());
  if(statusEl) statusEl.textContent=runs.length+' runs synced · '+Object.keys(newActuals).length+' training weeks';
}

function stravaDisconnect() {
  if(!confirm('Disconnect Strava and clear synced data?')) return;
  ['philly_strava_access_token','philly_strava_refresh_token','philly_strava_expires_at','philly_strava_actuals','philly_strava_activities','philly_strava_synced'].forEach(k=>localStorage.removeItem(k));

}

function fmtPace(p){const m=Math.floor(p),s=Math.round((p-m)*60);return m+':'+(s<10?'0':'')+s;}
function fmtMi(m){return m.toFixed(1);}
function fmtDur(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h?h+'h '+m+'m':m+'m';}
function runBarClass(e){return e>80?'hard':e>45?'mod':'easy';}

function drawVolChart(canvasId){
  const canvas=document.getElementById(canvasId);if(!canvas)return;
  const dpr=window.devicePixelRatio||1;
  const CW=canvas.clientWidth,CH=canvas.clientHeight;
  canvas.width=CW*dpr;canvas.height=CH*dpr;
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  const isDark=!document.body.classList.contains('light');
  const pad={l:28,r:6,t:8,b:22};
  const w=CW-pad.l-pad.r,h=CH-pad.t-pad.b;
  const n=W.length,maxMi=75;
  const borderClr=isDark?'#2A2724':'#DDD6C9';
  const textClr=isDark?'#6B6560':'#857F77';
  const barW=w/n;

  [25,50,75].forEach(mi=>{
    const y=pad.t+h-(mi/maxMi)*h;
    ctx.strokeStyle=borderClr;ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+w,y);ctx.stroke();
    ctx.fillStyle=textClr;ctx.font='9px Arial';ctx.textAlign='right';
    ctx.fillText(mi,pad.l-3,y+3);
  });

  W.forEach((wk,i)=>{
    const x=pad.l+i*barW;
    const bw=barW*0.38;
    const planH=(wk.mi/maxMi)*h;
    ctx.fillStyle=isDark?'rgba(91,155,213,0.18)':'rgba(37,99,171,0.15)';
    ctx.fillRect(x+barW*0.05,pad.t+h-planH,bw,planH);

    const actual=stravaActuals[i];
    if(actual!=null){
      const actH=(Math.min(actual,maxMi)/maxMi)*h;
      const ok=actual>=wk.mi-2;
      ctx.fillStyle=ok?(isDark?'#1a4030':'#B6E2C8'):(isDark?'#3A2800':'#EAD4A0');
      ctx.fillRect(x+barW*0.52,pad.t+h-actH,bw,actH);
    }
    if(i%5===0||i===n-1){
      ctx.fillStyle=textClr;ctx.font='9px Arial';ctx.textAlign='center';
      ctx.fillText('W'+(i+1),x+barW/2,pad.t+h+14);
    }
  });
}

function drawTrendChart(canvasId,data,colorFn,labelFn,invertY,yFmt){
  const canvas=document.getElementById(canvasId);if(!canvas||data.length<2)return;
  const dpr=window.devicePixelRatio||1;
  const CW=canvas.clientWidth,CH=canvas.clientHeight;
  canvas.width=CW*dpr;canvas.height=CH*dpr;
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  const isDark=!document.body.classList.contains('light');
  const textClr=isDark?'#7E7E86':'#888580';
  const gridClr=isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)';
  const lPad=yFmt?44:6;
  const pad={l:lPad,r:6,t:8,b:6};
  const w=CW-pad.l-pad.r,h=CH-pad.t-pad.b;
  const vals=data.map(d=>d.v);
  let mn=Math.min(...vals),mx=Math.max(...vals);
  if(mx-mn<0.5){mn-=0.25;mx+=0.25;}
  const xOf=(i)=>pad.l+(i/(data.length-1))*w;
  const yOf=(v)=>invertY?pad.t+((v-mn)/(mx-mn))*h:pad.t+h-((v-mn)/(mx-mn))*h;

  // Y axis grid lines + labels
  if(yFmt){
    ctx.font=`10px var(--mono,'JetBrains Mono',monospace)`;
    ctx.textAlign='right';
    const steps=4;
    for(let i=0;i<=steps;i++){
      const v=mn+(i/steps)*(mx-mn);
      const y=yOf(v);
      ctx.strokeStyle=gridClr;ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+w,y);ctx.stroke();
      ctx.fillStyle=textClr;
      ctx.fillText(yFmt(v),pad.l-5,y+3.5);
    }
  }

  ctx.beginPath();
  data.forEach((d,i)=>{i===0?ctx.moveTo(xOf(i),yOf(d.v)):ctx.lineTo(xOf(i),yOf(d.v));});
  ctx.lineTo(xOf(data.length-1),pad.t+h);ctx.lineTo(pad.l,pad.t+h);ctx.closePath();
  const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+h);
  grad.addColorStop(0,isDark?'rgba(255,59,36,0.28)':'rgba(255,59,36,0.16)');
  grad.addColorStop(1,'transparent');
  ctx.fillStyle=grad;ctx.fill();

  ctx.beginPath();
  data.forEach((d,i)=>{i===0?ctx.moveTo(xOf(i),yOf(d.v)):ctx.lineTo(xOf(i),yOf(d.v));});
  ctx.strokeStyle='#FF3B24';ctx.lineWidth=2;ctx.lineJoin='round';ctx.stroke();

  data.forEach((d,i)=>{
    ctx.beginPath();ctx.arc(xOf(i),yOf(d.v),3,0,Math.PI*2);
    ctx.fillStyle='#FF3B24';ctx.fill();
  });
}

    <div class="swim-block"><div class="swim-name">Sw-B · ~1,900m</div><div class="swim-desc">WU 400m easy continuous · Main 3×300m mod-hard (30s rest) + 4×50m hard · CD 400m easy continuous</div></div>
    <div class="swim-block"><div class="swim-name">Sw-C · ~1,500m</div><div class="swim-desc">WU 200m easy continuous · Main 6×150m easy-mod (20s rest) · CD 400m easy continuous</div></div>
    <div class="swim-block"><div class="swim-name">Sw-D · ~1,300m</div><div class="swim-desc">WU 200m easy continuous · Main 6×150m easy (20s rest) · CD 200m easy continuous · Use during flare-ups or taper</div></div>
  </div>
  <div class="ref-sec">
    <div class="ref-title">Gel protocol</div>
    <div class="ref-row"><span class="ref-key">SIS Beta Fuel</span><span class="ref-val">40g carbs</span></div>
    <div class="ref-row"><span class="ref-key">SIS Caffeinated</span><span class="ref-val">20g carbs + caffeine</span></div>
    <div class="ref-row"><span class="ref-key">Marathon total</span><span class="ref-val">5×Beta + 2×Caff ≈ 82g/hr</span></div>
    <div class="ref-row" style="flex-direction:column;align-items:flex-start;gap:4px">
      <span class="ref-key">Marathon timing</span>
      <span style="font-family:var(--mono);font-size:11px;color:var(--muted)">@20 · @45 · @70 · @90(C) · @110 · @130(C) · @150min</span>
    </div>
  </div>
  <div class="ref-sec">
    <div class="ref-title">Cross-device sync</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:10px;line-height:1.5">Enter your GitHub token to sync notes, check-offs and Strava data across all your devices. Anyone viewing the app sees your data automatically — no token needed to read.</div>
    <div style="display:flex;gap:8px;margin-bottom:6px">
      <input id="gh-token-inp" type="password"
        style="flex:1;background:var(--card);border:1px solid var(--border2);color:var(--text);font-family:Arial,sans-serif;font-size:13px;padding:9px 10px;border-radius:3px"
        placeholder="GitHub personal access token (ghp_...)"
        value="${ghToken()}">
      <button onclick="saveGhToken()"
        style="padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;background:var(--card2);border:1px solid var(--green-border);color:var(--green);font-family:Arial,sans-serif;border-radius:3px;white-space:nowrap">
        Save
      </button>
    </div>
    <div style="font-size:12px;color:var(--muted)">${canWrite()?'● Write access enabled — your data syncs automatically':'○ Read-only — enter token to enable sync'}</div>
  </div>
  </div>`;
}


function showTab(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('pane-'+id).classList.add('on');
  document.querySelector('.content').scrollTop=0;
  if(id==='stats')renderStats();
  if(id==='crew')renderCrew();
  if(id==='vdot'){}  // removed
}

function updateCountdown(){
  const days=Math.ceil((RACE_DATE-new Date())/864e5);
  document.getElementById('countdown').textContent=days+' days';
}

function refreshToday(){
  const newWk=getWeekIdx(),newDay=getDayIdx();
  const wkChanged=newWk!==todayWk;
  const changed=wkChanged||newDay!==todayDay;
  const wasOnCurrentWk=selWeek===todayWk;
  todayWk=newWk;todayDay=newDay;
  updateCountdown();
  if(changed){
    // If user was viewing the current week, auto-advance with it
    if(wasOnCurrentWk){selWeek=todayWk;selDay=todayDay;}
    renderToday();renderPlan();
  }
}

// Refresh when tab becomes visible again (catches overnight / next day)
document.addEventListener('visibilitychange',()=>{if(!document.hidden)refreshToday();});

// Also check every minute in case app stays open past midnight
let _lastDate=new Date().toDateString();
setInterval(()=>{
  const now=new Date().toDateString();
  if(now!==_lastDate){_lastDate=now;refreshToday();}
},60000);

updateCountdown();
const _vhdr=document.getElementById('vdot-hdr');if(_vhdr)_vhdr.textContent=workingVDOT.toFixed(1);
initTheme();
renderToday();renderPlan();renderRef();renderGym();
// Load cross-device data from GitHub after initial render
loadAppData();

// Auto-sync Strava on open if connected and last sync was >1 hour ago
(async()=>{
  if(!stravaIsConnected())return;
  const lastSync=parseInt(localStorage.getItem('philly_strava_last_sync')||'0');
  const hourMs=60*60*1000;
  if(Date.now()-lastSync<hourMs)return;
  try{
    await stravaSync();
    localStorage.setItem('philly_strava_last_sync',Date.now().toString());
    renderToday(); // refresh load flag with fresh data
  }catch(e){}
})();
</script>

</html>
